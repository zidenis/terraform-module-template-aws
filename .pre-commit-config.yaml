repos:
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.105.0
    hooks:
      - id: terraform_validate
      - id: terraform_fmt
      - id: terraform_tflint
        args:
          - --args=--config=__GIT_WORKING_DIR__/.tflint.hcl
      - id: terraform_trivy
        args:
          - --args=--quiet
      - id: terraform_checkov
        name: "Terraform validate with Checkov"
        args:
          - --args=--quiet
      - id: terraform_docs

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: detect-aws-credentials
        args: [--allow-missing-credentials]
        name: "Pre-commit hook: checks for the existence of AWS secrets"
      - id: detect-private-key
        name: "Pre-commit hook: checks for the existence of private keys"
      - id: end-of-file-fixer
        name: "Pre-commit hook: makes sure files end in a newline and only a newline"
      - id: trailing-whitespace
        name: "Pre-commit hook: trims trailing whitespace"
      - id: check-merge-conflict
        name: "Pre-commit hook: check for files that contain merge conflict strings"
      - id: mixed-line-ending
        args: [--fix=no]
        name: "Pre-commit hook: checks mixed line ending"
